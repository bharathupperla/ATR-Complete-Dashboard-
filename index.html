// Count up from 0 → target with cubic ease-out.
function useCountUp(target, duration = 1100, deps = []) {
  const [v, setV] = useState(0);
  const startRef = useRef(0);
  const fromRef  = useRef(0);
  useEffect(() => {
    fromRef.current = 0;
    startRef.current = performance.now();
    let raf = 0;
    const tick = (t) => {
      const k = Math.min(1, (t - startRef.current) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setV(fromRef.current + (target - fromRef.current) * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
    // eslint-disable-next-line
  }, [target, duration, ...deps]);
  return v;
}

// Cursor-tracked tilt. Returns ref + style.
function useCardTilt({ max = 9, lift = 14, baseX = 4 } = {}) {
  const ref = useRef(null);
  const [hover, setHover] = useState(false);
  const [t, setT] = useState({ rx: baseX, ry: 0, mx: 50, my: 50 });

  const onMove = useCallback((e) => {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const cx = (e.clientX - r.left) / r.width;
    const cy = (e.clientY - r.top) / r.height;
    const ry = (cx - 0.5) * (max * 2);
    const rx = baseX + (0.5 - cy) * (max * 2);
    setT({ rx, ry, mx: cx * 100, my: cy * 100 });
  }, [max, baseX]);

  const onEnter = useCallback(() => setHover(true), []);
  const onLeave = useCallback(() => { setHover(false); setT({ rx: baseX, ry: 0, mx: 50, my: 50 }); }, [baseX]);

  const style = {
    transform: `perspective(900px) rotateX(${t.rx}deg) rotateY(${t.ry}deg) translateZ(0) translateY(${hover ? -lift : 0}px)`,
    transition: hover ? 'transform 90ms linear, box-shadow 200ms ease' : 'transform 380ms cubic-bezier(.2,.8,.2,1), box-shadow 380ms ease',
    willChange: 'transform',
  };

  const handlers = { onMouseMove: onMove, onMouseEnter: onEnter, onMouseLeave: onLeave };
  return { ref, style, handlers, hover, mx: t.mx, my: t.my };
}

function useNow(intervalMs = 1000) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), intervalMs);
    return () => clearInterval(id);
  }, [intervalMs]);
  return now;
}

// Media-query hook
function useMediaQuery(query) {
  const [match, setMatch] = useState(() => typeof window !== 'undefined' && window.matchMedia(query).matches);
  useEffect(() => {
    const mq = window.matchMedia(query);
    const fn = (e) => setMatch(e.matches);
    mq.addEventListener('change', fn);
    return () => mq.removeEventListener('change', fn);
  }, [query]);
  return match;
}

function genHistory(seed, weeks, base, vol, drift) {
  // deterministic pseudo-random
  let x = seed;
  const r = () => { x = (x * 9301 + 49297) % 233280; return x / 233280; };
  const arr = [];
  let v = base;
  for (let i = 0; i < weeks; i++) {
    v = Math.max(0.4, v + (r() - 0.5) * vol + drift);
    arr.push(+v.toFixed(3));
  }
  return arr;
}

function genReturnSeries(seed, weeks, totalReturn) {
  let x = seed;
  const r = () => { x = (x * 9301 + 49297) % 233280; return x / 233280; };
  const arr = [];
  let cum = 0;
  for (let i = 0; i < weeks; i++) {
    const target = (totalReturn / (weeks - 1)) * i;
    const noise = (r() - 0.5) * 4.2;
    cum = target + noise;
    arr.push(+cum.toFixed(2));
  }
  arr[arr.length - 1] = totalReturn;
  return arr;
}

function PerspectiveGrid() {
  return (
    <div
      aria-hidden
      style={{
        position: 'fixed',
        inset: 0,
        zIndex: 0,
        pointerEvents: 'none',
        perspective: '900px',
        perspectiveOrigin: '50% 50%',
        overflow: 'hidden',
      }}>
      {/* Receding floor */}
      <div style={{
        position: 'absolute',
        left: '-50%',
        right: '-50%',
        top: '55%',
        height: '160%',
        transform: 'rotateX(75deg)',
        transformOrigin: 'top center',
        backgroundImage:
          'linear-gradient(rgba(0,229,255,0.18) 1px, transparent 1px),' +
          'linear-gradient(90deg, rgba(0,229,255,0.12) 1px, transparent 1px)',
        backgroundSize: '60px 60px, 60px 60px',
        animation: 'sw-grid-shift 7s linear infinite',
        maskImage: 'linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.45) 35%, transparent 75%)',
        WebkitMaskImage: 'linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.45) 35%, transparent 75%)',
      }} />

      {/* Vignette glow at vanishing point */}
      <div style={{
        position: 'absolute',
        left: '50%',
        top: '50%',
        width: 700,
        height: 700,
        marginLeft: -350,
        marginTop: -550,
        background: 'radial-gradient(closest-side, rgba(0,229,255,0.10), rgba(0,0,0,0) 70%)',
        filter: 'blur(20px)',
      }} />

      {/* Scanline */}
      <div style={{
        position: 'absolute',
        left: 0, right: 0,
        bottom: 0,
        height: 240,
        background: 'linear-gradient(to top, rgba(0,229,255,0.10), rgba(0,229,255,0.0))',
        animation: 'sw-scanline 9s linear infinite',
        mixBlendMode: 'screen',
      }} />

      {/* Horizon line */}

// =============================================================
// COUNT-UP NUMBER
// =============================================================
function CountNumber({ value, decimals = 2, suffix = '', prefix = '', color, style }) {
  const v = useCountUp(value, 1100);
  return (
    <span style={{ fontFamily: 'Space Mono, monospace', fontVariantNumeric: 'tabular-nums', color, ...style }}>
      {prefix}{v.toFixed(decimals)}{suffix}
    </span>
  );
}

// =============================================================
// ATR GAUGE BAR
// =============================================================
function AtrGauge({ atr }) {
  // Build 0..max scale from p25/p75 with padding
  const max = Math.max(atr.current, atr.p75) * 1.35;
  const min = 0;
  const pct = (v) => `${Math.max(0, Math.min(100, ((v - min) / (max - min)) * 100))}%`;
  const inZone = atr.current >= atr.p25 && atr.current <= atr.p75;
  const needleColor = inZone ? PALETTE.bullish : PALETTE.bearish;

  return (
    <div style={{ width: '100%' }}>
      <div style={{
        position: 'relative', height: 22,
        background: '#040810',
        borderRadius: 6,
        border: `1px solid ${PALETTE.border}`,
        boxShadow: 'inset 0 2px 6px rgba(0,0,0,0.7), inset 0 -1px 0 rgba(255,255,255,0.04)',
        overflow: 'hidden',
      }}>
        {/* danger zones */}
        <div style={{
          position: 'absolute', left: 0, top: 0, bottom: 0, width: pct(atr.p25),
          background: `linear-gradient(90deg, ${PALETTE.bearish}33, ${PALETTE.bearish}10)`,
        }} />
        <div style={{
          position: 'absolute', right: 0, top: 0, bottom: 0,
          left: pct(atr.p75),
          background: `linear-gradient(270deg, ${PALETTE.bearish}33, ${PALETTE.bearish}10)`,
        }} />
        {/* green zone */}
        <div style={{
          position: 'absolute', top: 0, bottom: 0,
          left: pct(atr.p25), width: `calc(${pct(atr.p75)} - ${pct(atr.p25)})`,
          background: `linear-gradient(90deg, ${PALETTE.bullish}40, ${PALETTE.bullish}25)`,
          boxShadow: `inset 0 0 12px ${PALETTE.bullish}33`,
        }} />
        {/* p25/p75 markers */}
        {[atr.p25, atr.p75].map((v, i) => (
          <div key={i} style={{
            position: 'absolute', top: -1, bottom: -1,
            left: pct(v), width: 1, background: PALETTE.text, opacity: 0.55,
          }} />
        ))}
        {/* Needle */}
        <div style={{
          position: 'absolute', top: -3, bottom: -3,
          left: pct(atr.current),
          width: 3, marginLeft: -1.5,
          background: needleColor,
          boxShadow: `0 0 10px ${needleColor}, 0 0 20px ${needleColor}88`,
          borderRadius: 1,
          transition: 'left 1.1s cubic-bezier(.2,.8,.2,1)',
        }} />
      </div>
      <div style={{
        display: 'grid',
        gridTemplateColumns: '1fr 1fr 1fr',
        marginTop: 6,
        fontFamily: 'Space Mono', fontSize: 9.5, color: PALETTE.textMute,
        letterSpacing: '0.14em', textTransform: 'uppercase',
      }}>
        <span>P25 {atr.p25.toFixed(2)}</span>
        <span style={{ textAlign: 'center', color: needleColor }}>ATR {atr.current.toFixed(2)}</span>
        <span style={{ textAlign: 'right' }}>P75 {atr.p75.toFixed(2)}</span>
      </div>
    </div>
  );
}

function explainSignal(s) {
  const inZone = s.atr.current >= s.atr.p25 && s.atr.current <= s.atr.p75;
  if (s.signal === 'BUY MORE') {
    return `Trend strength is high (R² ${s.trend.r2.toFixed(2)}, slope angle ${s.trend.angle.toFixed(1)}°) and ATR ${s.atr.current.toFixed(2)} sits ${inZone ? 'inside' : s.atr.current < s.atr.p25 ? 'below' : 'above'} the [${s.atr.p25.toFixed(2)} – ${s.atr.p75.toFixed(2)}] healthy band. Momentum continues; size up the position.`;
  }
  if (s.signal === 'SQUARE OFF') {
    return `Recent week deltas ${fmtPct(s.weekDelta)} / ${fmtPct(s.prevWeekDelta)} indicate momentum exhaustion. ATR ${s.atr.current.toFixed(2)} is ${s.atr.current > s.atr.p75 ? 'above the P75 ceiling — volatility regime expanding' : 'compressing below the P25 floor — trend losing energy'}. Take profit / cut.`;
  }
  return `Slope angle ${s.trend.angle.toFixed(1)}° with R² ${s.trend.r2.toFixed(2)} indicates a low-conviction trend. ATR ${s.atr.current.toFixed(2)} is ${inZone ? 'within' : 'outside'} the healthy band. Hold and re-evaluate next week.`;
}

}

                      {pos ? '+' : ''}{fmtUsd(h.pnl, 0)}
                    </td>
                    <td style={cellStyle('right', { color: pos ? PALETTE.bullish : PALETTE.bearish, fontWeight: 700 })}>
                      {fmtPct(h.returnPct)}
                    </td>
                  </tr>
                );
              })}
              <tr style={{
                borderTop: `1px solid ${PALETTE.borderHi}`,
                background: `linear-gradient(180deg, ${PALETTE.surfaceHi}, ${PALETTE.surface})`,
              }}>
                <td style={cellStyle('left', { fontFamily: 'Chakra Petch', fontWeight: 700, fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: PALETTE.textDim })}>
                  Totals
                </td>
                <td style={cellStyle()}>—</td>
                <td style={cellStyle()}>—</td>
                <td style={cellStyle()}>—</td>
                <td style={cellStyle('right', { color: PALETTE.text, fontWeight: 700 })}>{fmtUsd(totals.invested, 0)}</td>
                <td style={cellStyle('right', { color: PALETTE.text, fontWeight: 700 })}>{fmtUsd(totals.market,   0)}</td>
                <td style={cellStyle('right', { color: totals.pnl >= 0 ? PALETTE.bullish : PALETTE.bearish, fontWeight: 700 })}>
                  {totals.pnl >= 0 ? '+' : ''}{fmtUsd(totals.pnl, 0)}
                </td>
                <td style={cellStyle('right', { color: totalReturnPct >= 0 ? PALETTE.bullish : PALETTE.bearish, fontWeight: 700 })}>
                  {fmtPct(totalReturnPct)}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </PanelCard>

      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
        gap: 18,
      }}>
        <PanelCard title="Portfolio Metrics">
          <MetricRow label="Total Invested"  value={fmtUsd(totals.invested, 0)} />
          <MetricRow label="Market Value"    value={fmtUsd(totals.market, 0)} />
          <MetricRow label="Unrealised PnL"  value={`${totals.pnl >= 0 ? '+' : ''}${fmtUsd(totals.pnl, 0)}`} color={totals.pnl >= 0 ? PALETTE.bullish : PALETTE.bearish} />
          <MetricRow label="Realised PnL"    value={fmtUsd(p.realizedPnl, 0)} color={PALETTE.bullish} />
          <MetricRow label="Win Rate"        value={`${p.metrics.winRate}%`} color={PALETTE.cyan} />
          <MetricRow label="Sharpe (3M)"     value={p.metrics.sharpe.toFixed(2)} color={PALETTE.cyan} />
        </PanelCard>

        <PanelCard title="Trend Metrics">
          <MetricRow label="Slope"           value={p.trend.slope.toFixed(2)} />
          <MetricRow label="Slope Angle"     value={`${p.trend.angle.toFixed(1)}°`} color={PALETTE.amber} />
          <MetricRow label="R²"              value={p.trend.r2.toFixed(2)} color={PALETTE.cyan} />
          <MetricRow label="1W ATR"          value={p.atr1W.toFixed(2)} color={PALETTE.amber} />
          <MetricRow label="1M ATR"          value={p.atr1M.toFixed(2)} color={PALETTE.neutral} />
          <MetricRow label="Volatility"      value={`${p.metrics.volatility.toFixed(1)}%`} />
          <MetricRow label="Best Week"       value={`${p.metrics.bestWeek.week} · ${fmtPct(p.metrics.bestWeek.value)}`} color={PALETTE.bullish} />
          <MetricRow label="Worst Week"      value={`${p.metrics.worstWeek.week} · ${fmtPct(p.metrics.worstWeek.value)}`} color={PALETTE.bearish} />
          <MetricRow label="Max Drawdown"    value={fmtPct(p.metrics.maxDrawdown)} color={PALETTE.bearish} />
        </PanelCard>
      </div>
    </div>
  );
}

function cellStyle(align = 'right', extra = {}) {
  return {
    padding: '10px 14px',
    textAlign: align,
    fontFamily: 'Space Mono', fontSize: 12,
    color: PALETTE.textDim, fontVariantNumeric: 'tabular-nums',
    ...extra,
  };
}

function MetricRow({ label, value, color = PALETTE.text }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
      padding: '10px 0',
      borderBottom: `1px solid ${PALETTE.border}55`,
    }}>
      <span style={{
        fontFamily: 'Chakra Petch', fontSize: 11,
        letterSpacing: '0.22em', textTransform: 'uppercase', color: PALETTE.textMute,
      }}>{label}</span>
      <span style={{
        fontFamily: 'Space Mono', fontWeight: 700, fontSize: 14, color,
      }}>{value}</span>
    </div>
  );
}

// =============================================================
// PANEL CARD
// =============================================================
function PanelCard({ title, subtitle, right, children }) {
  return (
    <section style={{
      position: 'relative',
      background: `linear-gradient(165deg, ${PALETTE.surfaceHi} 0%, ${PALETTE.surface} 60%, #060c18 100%)`,
      border: `1px solid ${PALETTE.border}`,
      borderRadius: 12,
      padding: 'clamp(16px, 2.4vw, 22px)',
      boxShadow: panelShadow(false, 1),
    }}>
      <header style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 14, gap: 10,
      }}>
        <div>
          <div style={{
            fontFamily: 'Chakra Petch', fontWeight: 600, fontSize: 13,
            letterSpacing: '0.22em', textTransform: 'uppercase', color: PALETTE.text,
          }}>{title}</div>
          {subtitle ? <div style={{
            fontFamily: 'Space Mono', fontSize: 10, marginTop: 3,
            color: PALETTE.textMute, letterSpacing: '0.14em', textTransform: 'uppercase',
          }}>{subtitle}</div> : null}
        </div>
        {right}
      </header>
      {children}
    </section>
  );
}

// =============================================================
// PORTFOLIO DASHBOARD ROOT
// =============================================================
function PortfolioDashboard({ onBack }) {
  const [tab, setTab] = _pUseState('charts');
  const [loaded, setLoaded] = _pUseState(false);
  _pUseEffect(() => { const id = setTimeout(() => setLoaded(true), 500); return () => clearTimeout(id); }, []);

  return (
    <div style={{ position: 'relative', minHeight: '100vh', background: PALETTE.bg, color: PALETTE.text }}>
      <PerspectiveGrid />
      <div style={{ position: 'relative', zIndex: 5 }}>
        <TerminalHeader
          title="SIGNAL WATCH"
          mode="PORTFOLIO"
          onBack={onBack}
          badges={[
            <HeaderCountPill key="ho" label="Holdings" count={PORTFOLIO.holdings.length} color={PALETTE.cyan}    tickers={PORTFOLIO.holdings.map(h => h.ticker)} />,
            <HeaderCountPill key="up" label="Winners"  count={PORTFOLIO.holdings.filter(h => h.pnl >= 0).length} color={PALETTE.bullish} tickers={PORTFOLIO.holdings.filter(h => h.pnl >= 0).map(h => h.ticker)} />,
            <HeaderCountPill key="dn" label="Losers"   count={PORTFOLIO.holdings.filter(h => h.pnl < 0).length}  color={PALETTE.bearish} tickers={PORTFOLIO.holdings.filter(h => h.pnl < 0).map(h => h.ticker)} />,
          ]} />

        <PortfolioSignalStrip p={PORTFOLIO} />

        <div style={{
          display: 'flex', justifyContent: 'flex-end',
          padding: '20px clamp(14px, 3vw, 28px) 0',
        }}>
          <Tabs value={tab} onChange={setTab}
            options={[{ value: 'charts', label: 'Charts' }, { value: 'info', label: 'Info' }]} />
        </div>

        <main style={{ padding: 'clamp(18px, 3vw, 28px)' }}>
          {!loaded ? (
            <div style={{ display: 'grid', gap: 16 }}>
              <div className="sw-shimmer" style={{ height: 320, borderRadius: 12 }} />
              <div className="sw-shimmer" style={{ height: 220, borderRadius: 12 }} />
            </div>
          ) : tab === 'charts' ? <ChartsTab p={PORTFOLIO} /> : <InfoTab p={PORTFOLIO} />}
        </main>
      </div>
    </div>
  );
}

Object.assign(window, { PortfolioDashboard, PanelCard });


//============================================

// app.jsx — root component, mode router
const { useState: _aUseState, useEffect: _aUseEffect } = React;

function App() {
  _aUseEffect(() => { injectGlobalStyles(); }, []);
  const [mode, setMode] = _aUseState('entry'); // 'entry' | 'stocks' | 'portfolio'

  return (
    <div style={{ minHeight: '100vh', background: PALETTE.bg, color: PALETTE.text }}>
      {mode === 'entry' ? (
        <EntryScreen
          onSelectStocks={() => setMode('stocks')}
          onSelectPortfolio={() => setMode('portfolio')} />
      ) : mode === 'stocks' ? (
        <StockDashboard onBack={() => setMode('entry')} />
      ) : (
        <PortfolioDashboard onBack={() => setMode('entry')} />
      )}
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App />);

</script>
</body>
